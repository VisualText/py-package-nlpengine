name: Build and upload to PyPI

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*'

jobs:
  build_wheels_linux:
    name: Build wheels on Linux
    runs-on: ubuntu-latest
    # Uncomment for testing
    # if: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        # cibuildwheel must be new enough to know the cp313 identifier;
        # v2.19.2 predates CPython 3.13 and silently skips the cp313-* entry
        # in pyproject's build list, leaving 3.13 users with no wheel.
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_BUILD_VERBOSITY: 3
          # Note use of yum because anylinux is ancient CentOS
          CIBW_BEFORE_ALL: "yum install -y libicu-devel"
          CIBW_CONFIG_SETTINGS: "cmake.args=-DCMAKE_BUILD_TYPE=Release"
          # Uncomment for testing
          # CIBW_BUILD: "cp312-*"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-linux
          path: ./wheelhouse/*.whl

  build_wheels_macos:
    name: Build wheels on MacOS
    # Otherwise people with older Macs are out of luck
    runs-on: macOS-latest
    # Uncomment for testing
    # if: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install packages
        run: brew install autoconf-archive autoconf automake pkg-config

      - name: vcpkg setup
        run: |
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Build wheels
        run: |
          pip wheel -C "cmake.args=-DCMAKE_BUILD_TYPE=Release;-DCMAKE_TOOLCHAIN_FILE=./vcpkg/scripts/buildsystems/vcpkg.cmake" -v .

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-macos
          path: ./*.whl

  build_wheels_windows:
    name: Build wheels on Windows
    runs-on: windows-latest
    # Uncomment for testing
    # if: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: vcpkg build
        id: vcpkg
        uses: johnwason/vcpkg-action@v6
        with:
          manifest-dir: ${{ github.workspace }}
          triplet: x64-windows-release
          token: ${{ github.token }}
          github-binarycache: true

      - name: Build wheels
        # See the Linux job: v2.19.2 is too old to build cp313, so 3.13
        # Windows users fall through to the unbuildable sdist.
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_BUILD_VERBOSITY: 3
          CIBW_BEFORE_BUILD_WINDOWS: "pip install delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --add-path ${{ github.workspace }}/vcpkg/installed/x64-windows-release/bin -w {dest_dir} {wheel}"
          CIBW_CONFIG_SETTINGS: "cmake.args='-A x64;-DCMAKE_BUILD_TYPE=Release;-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake'"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-windows
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  release:
    name: Make release
    runs-on: ubuntu-latest
    needs:
      - build_sdist
      # Comment the next three for testing
      - build_wheels_linux
      - build_wheels_windows
      - build_wheels_macos
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - name: List
        run: find
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  upload_pypi:
    needs:
      - build_sdist
      # Comment the next three for testing
      - build_wheels_linux
      - build_wheels_windows
      - build_wheels_macos
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # Remove this line:
    # if: false
    # Uncomment this line:
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
